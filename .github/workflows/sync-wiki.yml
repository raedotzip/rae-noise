name: Sync API Docs to Wiki

# ──────────────────────────────────────────────────────────────────────────────
# This workflow generates TypeDoc API documentation from the core library and
# pushes the output to this repository's GitHub wiki.
#
# It is DISABLED by default (workflow_dispatch only, no automatic triggers).
# To enable automatic sync, uncomment the push trigger below.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API docs (JSON + HTML)
        run: pnpm docs

      - name: Copy JSON to website public dir
        run: |
          mkdir -p packages/website/public/api
          cp docs/api.json packages/website/public/api/api.json

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync docs to wiki
        run: |
          # Clear old wiki content (keep .git)
          find wiki -maxdepth 1 -not -name '.git' -not -name 'wiki' -not -name 'Home.md' | xargs rm -rf 2>/dev/null || true

          # Generate a wiki-friendly Home page
          cat > wiki/Home.md << 'HOMEEOF'
          # rae-noise API Reference

          Auto-generated from source via [TypeDoc](https://typedoc.org/).
          Last updated by CI — do not edit manually.

          ## Modules

          - [rae-noise](rae-noise.md)
          HOMEEOF

          # Copy the generated HTML docs into the wiki repo as reference
          # The JSON is the canonical source for the website frontend
          cp docs/api.json wiki/api.json

      - name: Push to wiki
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "docs: sync API reference from ${{ github.sha }}"
            git push
          fi
