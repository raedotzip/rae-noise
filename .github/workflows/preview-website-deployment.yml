name: Preview Website Deployment

on:
  pull_request:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      
      - name: Build Website
        run: pnpm build --filter=@rae-noise/website

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/website/dist

      - name: Deploy Preview
        id: deploy
        uses: actions/deploy-pages@v4