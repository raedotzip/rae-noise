<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="author" content="Raegan Grace Scheet"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#020611"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="application-name" content="scheet.dev"/>
  <meta property="og:title" content="RaeNoise"/>
  <meta property="og:description" content="Website for RaeNoise, A Noise Generation Visual Library"/>
  <meta property="og:url" content="https://scheet.dev"/>
  <meta property="og:image" content="https://scheet.dev/icons/raegan/rae-icon-512.png"/>
  <meta property="og:image:width" content="512"/>
  <meta property="og:image:height" content="512"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary"/>
  <meta name="twitter:image" content="https://scheet.dev/icons/raegan/rae-icon-512.png"/>
  <link rel="icon" href="icons/raegan/rae-icon-512.png"/>
  <link rel="apple-touch-icon" href="icons/raegan/rae-icon-512.png"/>
  <link rel="apple-touch-startup-image" href="/icons/raegan/rae-icon-512.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <title>RaeNoise</title>
</head>

<body>
  <div id="app">

    <aside id="panel">

      <header class="panel-header">
        <span class="logo">rae<em>noise</em></span>
        <span class="tag">demo tool</span>
      </header>

      <div class="add-row">
        <button id="addLayerBtn" class="add-btn">
          <span class="add-btn-icon">+</span>
          <span class="add-btn-label">add layer</span>
        </button>

        <button id="openNodeGraph" class="add-btn add-btn-secondary">
          <span class="add-btn-icon">⬡</span>
          <span class="add-btn-label">node graph</span>
        </button>
      </div>

      <div id="layerList"></div>

      <footer class="panel-footer">
        <div class="fps-counter">
          <span class="fps-dot"></span>
          <span id="fps">-- fps</span>
        </div>
        <span class="hint">layers composite top→bottom</span>
      </footer>

    </aside>

    <main id="viewport">
      <canvas id="glCanvas"></canvas>
      <div id="overlay-label">rae-noise v1.0.0</div>
    </main>

  </div>

  <!-- Modal -->
  <div id="nodeModal" class="modal-backdrop hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">node graph</span>
        <button id="nodeModalClose" class="modal-close">✕</button>
      </div>
      <canvas id="nodeCanvas"></canvas>
      <div class="modal-hint">
        drag nodes · click ports to connect · double-click canvas to add
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip">
    <div class="tooltip-title" id="tooltipTitle"></div>
    <div class="tooltip-body" id="tooltipBody"></div>
  </div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
